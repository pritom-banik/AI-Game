<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gomoku: Minimax vs MCTS</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="overlay">
    <div class="intro-container" id="menuMain">
      <h1 class="game-title">GOMOKU</h1>
      <div class="menu-options">
        <button class="btn-menu" id="playBtn">COMMIT BATTLE</button>
        <button class="btn-menu" id="aiVsAiBtn">AI VS AI BATTLE</button>
      </div>
    </div>

    <div class="intro-container" id="menuChooseAI" style="display: none;">
      <div class="menu-header">
        <button class="btn-back" id="backToMainBtn">←</button>
        <h2 class="menu-subtitle">CHOOSE YOUR OPPONENT</h2>
      </div>
      <p class="menu-desc">Who do you want to play against?</p>
      <div class="menu-options">
        <button class="btn-menu" id="playMinimaxBtn">MINIMAX</button>
        <button class="btn-menu" id="playMctsBtn">MCTS</button>
      </div>
    </div>
  </div>

  <div id="menuBar">☰</div>

  <div id="pauseMenu" class="hidden">
    <button id="resumeBtn">RESUME BATTLE !</button>
    <button id="mainMenuBtn">MAIN FIELD</button>
  </div>

  <div id="victoryOverlay" style="display: none;">
    <div class="victory-container">
      <h2 class="victory-title">VICTORY</h2>
      <p id="victoryMessage">Player Black Wins!</p>
      <button class="btn-menu" id="backToMenuBtn">BACK TO MAIN MENU</button>
    </div>
  </div>

  <div id="info">
    <span class="badge" id="playerBadge"></span>
    <span id="statusMessage">Initializing...</span>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
